<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="dezKVM Management Interface">
    <meta name="author" content="imuslab">
    <meta name="dezkvm.csrf.token" content="{{.csrfToken}}">
    <title>Streaming | DezKVM</title>
    <script src="js/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.9.4/semantic.min.css" integrity="sha512-ySrYzxj+EI1e9xj/kRYqeDL5l1wW0IWY8pzHNTIZ+vc1D3Z14UDNPbwup4yOUmlRemYjgUXsUZ/xvCQU2ThEAw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.9.4/semantic.min.js" integrity="sha512-Y/wIVu+S+XJsDL7I+nL50kAVFLMqSdvuLqF2vMoRqiMkmvcqFjEpEgeu6Rx8tpZXKp77J8OUpMKy0m3jLYhbbw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <link rel="stylesheet" href="viewport.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <div id="streamWrapper">
        <img id="remoteCapture" src="" oncontextmenu="return false;"></img>
        <!-- <video id="remoteCapture" src="" oncontextmenu="return false;"></video> -->
    </div>
   <div id="menu">
        <div id="advance-menu">
            <button class="ui mini icon button" id="btnStorageKvm" onclick="switchMassStorageToKvm()" title="Switch Storage to KVM">
                <i class="hdd icon"></i>
            </button>
            <button class="ui mini icon button" id="btnStorageRemote" onclick="switchMassStorageToRemote()" title="Switch Storage to Remote">
                <i class="cloud upload icon"></i>
            </button>
            <select id="resolutionSelect" class="ui compact dropdown" onchange="changeResolution(this.value)" style="display:none;">
                <option value="">Loading resolutions...</option>
            </select>
            <select id="audioQualitySelect" class="ui compact dropdown" onchange="changeAudioQuality(this.value)" style="display:none;">
                <option value="disabled">Audio Off</option>
                <option value="low">Low (16kHz)</option>
                <option value="standard">Standard (24kHz)</option>
                <option value="high">High (48kHz)</option>
            </select>
            <button class="ui mini icon button" id="btnResetHID" onclick="resetRemoteHID()" title="Reset Remote HID Device">
                <i class="refresh icon"></i>
            </button>
             <button class="ui mini icon button" id="showPasteBox" onclick="showScreenshotSelector()" title="Copy with OCR">
                <i class="copy icon"></i>
            </button>
            <button class="ui mini icon button" id="showPasteBox" onclick="showPasteBox()" title="Show Paste Box">
                <i class="paste icon"></i>
            </button>
            <button class="ui mini icon button" id="btnOnscreenKeyboard" onclick="toggleOnscreenKeyboard()" title="Toggle On-Screen Keyboard">
                <i class="keyboard icon"></i>
            </button>
            <button class="ui mini icon button" id="btnScaleToFit" onclick="toggleScaleToFit()" title="Toggle Scale to Fit">
                <i class="expand icon"></i>
            </button>
            <button class="ui mini icon button" id="btnDisconnect" onclick="disconnect()" title="Disconnect">
                <i class="sign out icon"></i>
            </button>
            
        </div>
        <div id="basic-menu">
             <button class="ui mini basic icon button" id="btnFullScreen" onclick="toggleFullScreen()" title="Fullscreen">
                <i style="font-weight: bolder;" class="expand icon"></i>
            </button>
            <button class="ui mini basic icon button" id="btnOpenSettings" onclick="openSettingsOverlay()" title="Settings">
                <i style="font-weight: bolder;" class="cog icon"></i>
            </button>
            <button class="ui mini basic icon button" id="btnToggleAdvanceMenu" onclick="toggleAdvanceMenu()" title="Show/Hide Advanced Menu">
                <i style="font-weight: bolder;" class="angle down icon"></i>
            </button>
        </div>
        
    </div>

    <!-- Paste Box Modal -->
    <div id="pasteBox" class="paste-box-container" style="display: none;"></div>

    <!-- Onscreen Keyboard -->
    <div id="onscreenKeyboard" class="onscreen-keyboard" style="display: none;"></div>
   
    <!-- Settings -->
    <div id="settings-overlay" class=""></div>
    <script src="js/viewport.js"></script>
    <script src="js/kvmevt.js"></script>
    <script src="js/ocr-copy.js"></script>
    <script>
        $("#onscreenKeyboard").load("components/on-screen-keyboard.html", function() {
            console.log("On-Screen Keyboard component loaded.");
        });

        $("#pasteBox").load("components/paste-box.html", function() {
            console.log("Paste Box component loaded.");
        });

        $("#settings-overlay").load("components/settings-overlay.html", function() {
            console.log("Settings Overlay component loaded.");
        });
    </script>
</body>
</html>
